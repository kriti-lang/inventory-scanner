<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <meta name="theme-color" content="#0b57d0">

  <title>Inventory QR Scanner</title>

  <script
    src="https://unpkg.com/@zxing/browser@0.2.0/umd/zxing-browser.min.js">
  </script>

  <style>
    :root {
      --primary: #0b57d0;
      --background: #f4f7fb;
      --surface: #ffffff;
      --border: #d9e1ec;
      --text: #172033;
      --muted: #657086;
      --success: #137333;
      --success-bg: #e6f4ea;
      --danger: #b3261e;
      --danger-bg: #fce8e6;
      --info: #174ea6;
      --info-bg: #e8f0fe;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding-bottom: 26px;
      color: var(--text);
      background: var(--background);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      padding:
        calc(16px + env(safe-area-inset-top))
        18px
        16px;
      color: white;
      background:
        linear-gradient(135deg, #0b57d0, #4b7bec);
    }

    .topbar-inner,
    .content {
      width: min(100%, 720px);
      margin: 0 auto;
    }

    .topbar h1 {
      margin: 0;
      font-size: 23px;
    }

    .content {
      padding: 16px;
    }

    .card {
      margin-bottom: 14px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: 0 8px 24px rgba(30, 50, 80, 0.08);
    }

    .stack {
      display: grid;
      gap: 11px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .message {
      display: none;
      margin-bottom: 14px;
      padding: 13px 14px;
      border-radius: 14px;
      font-weight: 650;
    }

    .message.show {
      display: block;
    }

    .message.info {
      color: var(--info);
      background: var(--info-bg);
    }

    .message.success {
      color: var(--success);
      background: var(--success-bg);
    }

    .message.error {
      color: var(--danger);
      background: var(--danger-bg);
    }

    label,
    .label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input,
    button {
      width: 100%;
      min-height: 52px;
      padding: 13px 15px;
      border-radius: 14px;
      font: inherit;
    }

    input {
      border: 1px solid #c9d2df;
      background: white;
    }

    button {
      border: 0;
      font-weight: 800;
      cursor: pointer;
    }

    .primary {
      color: white;
      background: var(--primary);
    }

    .secondary {
      color: var(--primary);
      background: #e8f0fe;
    }

    .ghost {
      color: var(--muted);
      background: #eef2f7;
    }

    .danger {
      color: var(--danger);
      background: var(--danger-bg);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .scanner-frame {
      position: relative;
      overflow: hidden;
      width: 100%;
      min-height: 320px;
      border-radius: 16px;
      background: #10131a;
    }

    video {
      display: block;
      width: 100%;
      min-height: 320px;
      object-fit: cover;
    }

    .scan-guide {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(65vw, 260px);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border: 4px solid white;
      border-radius: 20px;
      box-shadow:
        0 0 0 9999px rgba(0, 0, 0, 0.28);
      pointer-events: none;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 520px) {
      .button-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <h1>Inventory QR Scanner</h1>
    </div>
  </header>

  <main class="content">
    <div
      id="message"
      class="message"
      role="alert"
      aria-live="polite">
    </div>

    <section class="card stack">
      <p class="subtitle">
        Scan an existing QR code containing
        <strong>location,room</strong>.
      </p>

      <div class="scanner-frame">
        <video
          id="scanner-video"
          muted
          playsinline>
        </video>

        <div class="scan-guide"></div>
      </div>

      <div class="button-row">
        <button
          id="start-button"
          type="button"
          class="primary">
          Start Scanner
        </button>

        <button
          id="stop-button"
          type="button"
          class="danger hidden">
          Stop Scanner
        </button>
      </div>
    </section>

    <section class="card stack">
      <span class="label">Enter location manually</span>

      <label for="manual-location">Location</label>

      <input
        id="manual-location"
        type="text"
        placeholder="B-3"
      >

      <label for="manual-room">Room</label>

      <input
        id="manual-room"
        type="text"
        placeholder="Cargo Hold 3"
      >

      <button
        id="manual-button"
        type="button"
        class="secondary">
        Load Location
      </button>
    </section>

    <section class="card">
      <button
        id="back-button"
        type="button"
        class="ghost">
        Back to Inventory
      </button>
    </section>
  </main>

  <script>
    const APPS_SCRIPT_URL =
      "https://script.google.com/a/macros/co.bot/s/AKfycbwjDzx9KMHlMwWhYRnzQWJKr9qwhh8eeJR0u7MZNPmTrpQbX9b-3vfdMng7nedQe-7DlQ/exec";

    const videoElement =
      document.getElementById("scanner-video");

    const startButton =
      document.getElementById("start-button");

    const stopButton =
      document.getElementById("stop-button");

    const manualButton =
      document.getElementById("manual-button");

    const backButton =
      document.getElementById("back-button");

    let scannerControls = null;
    let redirecting = false;


    function showMessage(text, type) {
      const message =
        document.getElementById("message");

      message.textContent = text;
      message.className =
        "message show " + (type || "info");
    }


    function parseLocationQr(rawText) {
      const pieces = String(rawText)
        .split(",")
        .map(function (value) {
          return value.trim();
        });

      if (
        pieces.length < 2 ||
        !pieces[0] ||
        !pieces[1]
      ) {
        throw new Error(
          "Expected QR text in this format: location,room"
        );
      }

      return {
        location: pieces[0],
        room: pieces.slice(1).join(",")
      };
    }


    function openInventoryLocation(location, room) {
      if (redirecting) {
        return;
      }

      redirecting = true;

      showMessage(
        "Location found: " +
        location +
        ", " +
        room,
        "success"
      );

      stopScanner();

      const destination =
        new URL(APPS_SCRIPT_URL);

      destination.searchParams.set(
        "location",
        location
      );

      destination.searchParams.set(
        "room",
        room
      );

      window.location.assign(
        destination.toString()
      );
    }


    function openInventoryApp(rawText) {
      const parsed =
        parseLocationQr(rawText);

      openInventoryLocation(
        parsed.location,
        parsed.room
      );
    }


    async function startScanner() {
      redirecting = false;
      startButton.disabled = true;

      try {
        if (
          !window.isSecureContext ||
          !navigator.mediaDevices ||
          !navigator.mediaDevices.getUserMedia
        ) {
          throw new Error(
            "Open this page through HTTPS in Safari or Chrome."
          );
        }

        if (
          !window.ZXingBrowser ||
          !ZXingBrowser.BrowserQRCodeReader
        ) {
          throw new Error(
            "The QR scanner library did not load."
          );
        }

        const devices =
          await ZXingBrowser.BrowserCodeReader
            .listVideoInputDevices();

        if (!devices.length) {
          throw new Error(
            "No camera was found."
          );
        }

        const rearCamera =
          devices.find(function (device) {
            const label =
              String(device.label || "")
                .toLowerCase();

            return (
              label.includes("back") ||
              label.includes("rear") ||
              label.includes("environment")
            );
          });

        const selectedDeviceId =
          rearCamera
            ? rearCamera.deviceId
            : devices[devices.length - 1].deviceId;

        const codeReader =
          new ZXingBrowser.BrowserQRCodeReader();

        scannerControls =
          await codeReader.decodeFromVideoDevice(
            selectedDeviceId,
            videoElement,
            function (result, error) {
              if (result) {
                try {
                  openInventoryApp(
                    result.getText()
                  );
                } catch (parseError) {
                  showMessage(
                    parseError.message,
                    "error"
                  );
                }
              }

              if (
                error &&
                error.name !== "NotFoundException"
              ) {
                console.warn(error);
              }
            }
          );

        startButton.classList.add("hidden");
        stopButton.classList.remove("hidden");

        showMessage(
          "Scanner active. Place the QR code inside the square.",
          "info"
        );
      } catch (error) {
        showMessage(
          error && error.message
            ? error.message
            : String(error),
          "error"
        );

        startButton.disabled = false;
      }
    }


    function stopScanner() {
      if (scannerControls) {
        try {
          scannerControls.stop();
        } catch (error) {
          console.warn(error);
        }
      }

      scannerControls = null;

      const stream =
        videoElement.srcObject;

      if (stream) {
        stream
          .getTracks()
          .forEach(function (track) {
            track.stop();
          });

        videoElement.srcObject = null;
      }

      startButton.disabled = false;
      startButton.classList.remove("hidden");
      stopButton.classList.add("hidden");
    }


    function useManualLocation() {
      const location =
        document
          .getElementById("manual-location")
          .value
          .trim();

      const room =
        document
          .getElementById("manual-room")
          .value
          .trim();

      if (!location || !room) {
        showMessage(
          "Enter both location and room.",
          "error"
        );

        return;
      }

      redirecting = false;

      openInventoryLocation(
        location,
        room
      );
    }


    function returnToInventory() {
      stopScanner();
      window.location.assign(APPS_SCRIPT_URL);
    }


    startButton.addEventListener(
      "click",
      startScanner
    );

    stopButton.addEventListener(
      "click",
      stopScanner
    );

    manualButton.addEventListener(
      "click",
      useManualLocation
    );

    backButton.addEventListener(
      "click",
      returnToInventory
    );

    window.addEventListener(
      "pagehide",
      stopScanner
    );
  </script>
</body>
</html>
